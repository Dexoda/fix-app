version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fixapp
      POSTGRES_USER: fixapp
      POSTGRES_PASSWORD: fixapp123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fixapp:fixapp123@db:5432/fixapp
      SECRET_KEY: change-me-in-production-please
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      UPLOAD_DIR: /app/uploads
      MAX_VIDEO_SIZE_MB: 50
      FIRST_SUPERADMIN_EMAIL: admin@fixapp.local
      FIRST_SUPERADMIN_PASSWORD: admin123
      FIRST_SUPERADMIN_NAME: Super Admin
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
